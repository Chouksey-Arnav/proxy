<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Private Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { text-align: center; padding: 40px; border-radius: 20px; background: #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 20px; font-size: 2rem; }
        button { padding: 15px 40px; font-size: 1.1rem; font-weight: bold; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 10px; transition: 0.3s; }
        button:hover { background: #2563eb; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="box">
        <h1>Private Proxy</h1>
        <button onclick="launchProxy()">Launch Secure Search</button>
    </div>

    <script>
        function launchProxy() {
            const searchTerm = prompt("Enter your search query:");
            if (!searchTerm) return;

            // 1. Open the about:blank tab
            const win = window.open('about:blank', '_blank');
            if (!win) {
                alert("POP-UP BLOCKED! Check your address bar and click 'Allow' to use the proxy.");
                return;
            }

            // 2. Prepare the proxy URL
            const proxyUrl = window.location.origin + "/api/proxy?q=" + encodeURIComponent(searchTerm);

            // 3. Inject the Proxy into the about:blank page
            win.document.write(`
                <html>
                <head><title>Search</title></head>
                <body style="margin:0; padding:0; height:100vh; overflow:hidden;">
                    <iframe src="${proxyUrl}" style="width:100%; height:100%; border:none; margin:0; padding:0;"></iframe>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
