<!DOCTYPE html>
<html>
<head>
    <title>Private Search</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a1a; color: white; }
        .container { text-align: center; }
        button { padding: 15px 30px; font-size: 1.1rem; cursor: pointer; background: #0070f3; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Proxy Launcher</h1>
        <button onclick="launch()">Start Private Search</button>
    </div>

    <script>
        function launch() {
            const q = prompt("Search Query:");
            if (!q) return;

            const win = window.open('about:blank', '_blank');
            if (!win) {
                alert("Please allow pop-ups for this site!");
                return;
            }

            // This builds the full URL to your Vercel proxy
            const target = window.location.origin + "/api/proxy?q=" + encodeURIComponent(q);

            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            
            const frame = win.document.createElement('iframe');
            frame.src = target;
            frame.style.width = '100%';
            frame.style.height = '100%';
            frame.style.border = 'none';
            
            win.document.body.appendChild(frame);
        }
    </script>
</body>
</html>
